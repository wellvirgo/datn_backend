spring:
  application:
    name: backend
  datasource:
    url: jdbc:oracle:thin:@//localhost:1521/freepdb1
    username: ${USER_DB}
    password: ${PASS_DB}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        jdbc:
          batch_size: 100
        order_inserts: true
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.OracleDialect
  servlet:
    multipart:
      max-file-size: 6MB
      max-request-size: 10MB
  ai:
    google:
      genai:
        api-key: ${GEMINI_KEY}
        chat:
          options:
            model: gemini-2.5-flash

security:
  jwt:
    public-key: ${RSA_PUB_KEY}
    private-key: ${RSA_PRV_KEY}
    access-token-alive-time: 300 #seconds
    refresh-token-alive-time: 604800 #seconds

logging:
  level:
    org:
      springframework:
        security: OFF #TRACE

storage:
  context-path: http://localhost:8080/
  base-path: upload/images
  paths:
    room-type: room-types/
    user: users/

stripe:
  api:
    key: ${STRIPE_KEY}
  webhook:
    key: ${STRIPE_WH_KEY}

chat:
  ai:
    base-prompt: ${GEMINI_BASE_PROMPT}
